/* ── Source modal chrome ── */
.src-modal-bg{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .22s}

.src-modal{background:#0d1117;border:1px solid #30363d;border-radius:20px;max-width:780px;width:100%;max-height:90vh;display:flex;flex-direction:column;transform:translateY(20px) scale(.97);transition:transform .28s cubic-bezier(.16,1,.3,1)}
.src-modal-bg.open .src-modal{transform:none}
.src-modal-hd{display:flex;align-items:center;gap:.75rem;padding:1rem 1.4rem;border-bottom:1px solid #30363d;flex-shrink:0;background:#161b22;border-radius:20px 20px 0 0}
.src-modal-dots{display:flex;gap:6px}
.src-modal-dots s{width:11px;height:11px;border-radius:50%;background:#30363d;display:block}
.src-modal-dots s:first-child{background:var(--accent)}
.src-modal-fname{font-size:.8rem;font-weight:600;color:#8b949e;letter-spacing:.02em;flex:1;font-family:'Menlo','Monaco',monospace}
.src-copy-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.38em .9em;border-radius:7px;border:1px solid #30363d;background:#21262d;color:#c9d1d9;font-family:var(--font);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;flex-shrink:0;line-height:1}
.src-copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.src-copy-btn.copied{border-color:rgba(34,197,94,.5);color:var(--accent);background:rgba(34,197,94,.08)}
.src-close-btn{width:28px;height:28px;border-radius:7px;border:1px solid #30363d;background:transparent;color:#8b949e;font-size:.9rem;cursor:pointer;display:grid;place-items:center;transition:all .15s;flex-shrink:0}
.src-close-btn:hover{border-color:#8b949e;color:#e6edf3}
.src-modal-body{overflow-y:auto;flex:1;min-height:0;padding:1.6rem 2rem}
.src-modal-ft{padding:.85rem 1.4rem;border-top:1px solid #30363d;display:flex;justify-content:flex-end;flex-shrink:0;background:#161b22;border-radius:0 0 20px 20px}
.src-gh-link{font-size:.83rem;color:#8b949e;text-decoration:none;transition:color .15s}
.src-gh-link:hover{color:#58a6ff;text-decoration:underline}

/* ── Rendered markdown (GitHub dark style) ── */
.src-md{color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;font-size:.9rem;line-height:1.65;word-break:break-word}
.src-md h1,.src-md h2,.src-md h3,.src-md h4{color:#e6edf3;font-weight:700;margin:1.4em 0 .6em;line-height:1.2;letter-spacing:-.01em}
.src-md h1{font-size:1.6em;padding-bottom:.35em;border-bottom:1px solid #30363d}
.src-md h2{font-size:1.25em;padding-bottom:.3em;border-bottom:1px solid #21262d}
.src-md h3{font-size:1.05em}
.src-md h4{font-size:.95em;color:#8b949e}
.src-md p{margin:.7em 0}
.src-md a{color:#58a6ff;text-decoration:none}
.src-md a:hover{text-decoration:underline}
.src-md strong{color:#e6edf3;font-weight:700}
.src-md em{font-style:italic;color:#c9d1d9}
.src-md code{font-family:'Menlo','Monaco','Courier New',monospace;font-size:.85em;background:#161b22;border:1px solid #30363d;border-radius:5px;padding:.12em .4em;color:#e6edf3}
.src-md pre{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1rem 1.2rem;overflow-x:auto;margin:.9em 0}
.src-md pre code{background:none;border:none;padding:0;font-size:.82rem;line-height:1.7;color:#c9d1d9}
.src-md ul,.src-md ol{margin:.6em 0;padding-left:1.8em}
.src-md li{margin:.3em 0;line-height:1.6}
.src-md blockquote{border-left:3px solid #30363d;margin:.8em 0;padding:.4em 1em;color:#8b949e}
.src-md hr{border:none;border-top:1px solid #30363d;margin:1.5em 0}
.src-md table{border-collapse:collapse;width:100%;margin:.9em 0;font-size:.87rem}
.src-md th{background:#161b22;color:#e6edf3;font-weight:700;text-align:left;padding:.55em .9em;border:1px solid #30363d}
.src-md td{padding:.5em .9em;border:1px solid #21262d;vertical-align:top}
.src-md tr:nth-child(even) td{background:rgba(255,255,255,.02)}

.src-md .frontmatter{background:#161b22;border:1px solid #30363d;border-left:3px solid #8b949e;border-radius:6px;padding:.85rem 1.1rem;margin-bottom:1.4rem;font-family:'Menlo','Monaco',monospace;font-size:.8rem;color:#8b949e;line-height:1.65;white-space:pre-wrap}

.btn-view-source:hover{background:rgba(34,197,94,.2)}
.modal-actions .modal-gh-link{margin-top:0;padding:.48em 1.05em;font-size:.86rem;line-height:1}
</style>

   desc:'Personalised roadmap with YouTube, articles, books, and projects for your career goal',
   triggers:['what should I learn','career advice','learning roadmap','how do I become an FDE','harness engineering career'],
   example:{in:'Frontend dev, 2yr experience, want FDE at Palantir',out:'3-phase roadmap with specific YouTube channels, books, projects, and weekly routine'},
   tools:['claude-code','cursor','vscode','codex','windsurf','gemini']},

  {id:'weekend-planner',cat:'extended',catLabel:'Extended — Personal',aud:'both',
   name:'weekend-planner',
   desc:'Surface 10 time-sensitive local activities tailored to your family\'s profile',
   triggers:['plan my weekend','things to do this weekend','weekend activities','what\'s on near me'],
   example:{in:'Family of 4, kids 6 and 9, London, rainy Saturday',out:'10 ranked activities with booking links, age-suitability, and 3 backup options'},
   tools:['claude-code']},

  {id:'skill-editor',cat:'extended',catLabel:'Extended — Builder',aud:'dev',
   name:'skill-editor',
   desc:'Audit and tighten an existing SKILL.md — cuts bloat, fixes structure, evals before shipping',
   triggers:['edit this skill','audit my skill','improve this SKILL.md','skill is too long','fix my skill'],
   example:{in:'A 700-line SKILL.md with vague descriptions',out:'Audit report: pattern violations flagged, trimmed version under 500 lines, eval test cases added'},
   tools:['claude-code']},
];

// ── Build filter bar ──────────────────────────────────────────
const filterBar = document.getElementById('filterBar');
CATS.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (c.id === 'all' ? ' active' : '');
  btn.dataset.cat = c.id;
  btn.textContent = c.label;
  filterBar.appendChild(btn);
});

filterBar.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const cat = btn.dataset.cat;
  document.querySelectorAll('.skill-card').forEach(card => {
    const match = cat === 'all' || card.dataset.cat === cat;
    card.classList.toggle('hidden', !match);
  });
});

// ── Build skills grid ─────────────────────────────────────────
const grid = document.getElementById('skillsGrid');
SKILLS.forEach(s => {
  const card = document.createElement('div');
  card.className = 'skill-card fade-up';
  card.dataset.cat = s.cat;
  card.dataset.id = s.id;
  card.innerHTML = `
    <div class="skill-card-top">
      <span class="badge badge-cat">${s.catLabel}</span>
      ${AUD[s.aud]}
    </div>
    <div class="skill-name">${s.name}</div>
    <div class="skill-desc">${s.desc}</div>
    <div class="skill-triggers">
      <span class="skill-trigger-hint">${s.triggers[0]}</span>
      ${s.triggers[1] ? ` &middot; <span class="skill-trigger-hint">${s.triggers[1]}</span>` : ''}
    </div>`;
  grid.appendChild(card);
});

// ── Modal ─────────────────────────────────────────────────────
const modalBg = document.getElementById('modalBg');
const modalContent = document.getElementById('modalContent');

function openModal(skill) {
  const toolChips = skill.tools.map(t => `<span class="tool-chip">${TOOL_LABELS[t]}</span>`).join('');
  const triggerChips = skill.triggers.map(t => `<span class="trigger-chip">${t}</span>`).join('');
  const ghPath = skill.cat.startsWith('extended') ? `extended-skills/${skill.id}` : `dev-pm-skills/${skill.id}`;
  modalContent.innerHTML = `
    <div class="modal-name">${skill.name}</div>
    <div class="modal-badges">
      <span class="badge badge-cat">${skill.catLabel}</span>
      ${AUD[skill.aud]}
    </div>
    <p style="font-size:.95rem;color:var(--text-secondary);line-height:1.55">${skill.desc}</p>
    <div class="modal-section">
      <div class="modal-section-title">How to trigger</div>
      <div class="trigger-chips">${triggerChips}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Example</div>
      <div class="modal-example">
        <div class="modal-ex-row">
          <span class="modal-ex-label">In</span>
          <span class="modal-ex-val">${skill.example.in}</span>
          <span class="modal-ex-label">Out</span>
          <span class="modal-ex-val" style="color:var(--accent)">${skill.example.out}</span>
        </div>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Works with</div>
      <div class="tool-chips">${toolChips}</div>
    </div>
    <div class="modal-actions">
      <button class="btn-view-source" onclick="openSource('${skill.id}','${ghPath}')">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="5" width="9" height="9" rx="2"/><path d="M3 11V3a2 2 0 0 1 2-2h8"/>
        </svg>
        View source
      </button>
      <a href="https://github.com/majidraza1228/claude-skills/tree/main/${ghPath}/SKILL.md"
         class="modal-gh-link" target="_blank" rel="noopener">Open on GitHub ↗</a>
    </div>`;
  modalBg.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modalBg.classList.remove('open');
  document.body.style.overflow = '';
}

grid.addEventListener('click', e => {
  const card = e.target.closest('.skill-card');
  if (!card) return;
  const skill = SKILLS.find(s => s.id === card.dataset.id);
  if (skill) openModal(skill);
});

document.getElementById('modalClose').addEventListener('click', closeModal);
modalBg.addEventListener('click', e => { if (e.target === modalBg) closeModal(); });

// ── Source modal ──────────────────────────────────────────────
const srcModalBg = document.getElementById('srcModalBg');
const srcMd = document.getElementById('srcMd');
const srcFname = document.getElementById('srcFname');
const srcGhLink = document.getElementById('srcGhLink');
let currentSourceText = '';

function openSource(id, ghPath) {
  const raw = (typeof SKILL_SOURCE !== 'undefined' && SKILL_SOURCE[id])
    ? SKILL_SOURCE[id]
    : '# Source not available\n\nOpen on GitHub to view the full SKILL.md file.';
  currentSourceText = raw;
  const fmMatch = raw.match(/^---\n([\s\S]*?)\n---\n?/);
  let body = raw;
  let fmHtml = '';
  if (fmMatch) {
    fmHtml = `<div class="frontmatter">---\n${fmMatch[1]}\n---</div>`;
    body = raw.slice(fmMatch[0].length);
  }
  srcMd.innerHTML = fmHtml + (typeof marked !== 'undefined' ? marked.parse(body) : `<pre>${body}</pre>`);
  srcFname.textContent = ghPath + '/SKILL.md';
  srcGhLink.href = `https://github.com/majidraza1228/claude-skills/tree/main/${ghPath}/SKILL.md`;
  srcModalBg.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSource() {
  srcModalBg.classList.remove('open');
  document.body.style.overflow = '';
  srcMd.innerHTML = '';
  currentSourceText = '';
  const btn = document.getElementById('srcCopyBtn');
  btn.textContent = '';
  btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="9" height="9" rx="2"/><path d="M3 11V3a2 2 0 0 1 2-2h8"/></svg> Copy';
  btn.classList.remove('copied');
}

async function copySource() {
  const btn = document.getElementById('srcCopyBtn');
  try {
    await navigator.clipboard.writeText(currentSourceText);
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 8 6 12 14 4"/></svg> Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="9" height="9" rx="2"/><path d="M3 11V3a2 2 0 0 1 2-2h8"/></svg> Copy';
      btn.classList.remove('copied');
    }, 2000);
  } catch {
    btn.textContent = 'Copy failed';
  }
}

document.getElementById('srcClose').addEventListener('click', closeSource);
srcModalBg.addEventListener('click', e => { if (e.target === srcModalBg) closeSource(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { if (srcModalBg.classList.contains('open')) closeSource(); else closeModal(); } });

// ── Fade-up on scroll ──────────────────────────────────────────
const fadeObs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); fadeObs.unobserve(e.target); } });
}, { threshold: .08 });
document.querySelectorAll('.fade-up').forEach(el => fadeObs.observe(el));
</script>
</body>
</html>
